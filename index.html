<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Pot Display</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: black;
            color: white;
            /* color: #f1e8cb; */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .row {
            display: flex;
        }

        .upper {
            flex-direction: column;
            align-items: center;
            font-size: 40vh;
        }

        .upper .title {
            font-size: 14vh;
        }

        .bottom {
            flex-direction: row;
            justify-content: space-between;
            align-items: end;
            font-size: 2vh;
        }

        .logos {
            display: flex;
            flex-direction: column;
        }

        .image-container {
            width: 25vh;
            height: 10vh;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
        }

        .image-container:has(img[src=""]) {
            display: none;
        }

        .powered-by {
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .qr-code {
            display: flex;
            flex-direction: column;
            height: 25vh;
            width: 25vh;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>

    <script>
        function updatePotAmount() {
            fetch('https://raffle.link/wpgfringe/raffle/current/pot.json')
                .then(response => response.json())
                .then(data => {
                    const formattedAmount = data.raffle.potSize.formatted; // Use the formatted property
                    const withoutCents = formattedAmount.replace(/\..*/g, ''); // Remove .00 at the end
                    document.getElementById('pot-amount').textContent = `${withoutCents}`;
                })
                .catch(error => {
                    console.error('Error fetching data: ', error);
                });
        }

        // Initial update
        updatePotAmount();

        // Periodically refresh every 5 seconds
        setInterval(updatePotAmount, 5000);
    </script>
